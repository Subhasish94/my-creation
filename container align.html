<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exact Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .section {
      padding: 60px 0;
    }

    /* Left touch */
    .left-touch {
      margin-left: calc(-1 * (100vw - 100%) / 2);
    }

    /* Right touch */
    .right-touch {
      margin-right: calc(-1 * (100vw - 100%) / 2);
    }

    .box {
      padding: 50px;
      color: white;
    }
  </style>
</head>

<body>

  <!-- Section 1 -->
  <div class="container-fluid p-0">
    <div class="bg-primary text-white p-5">
      Section 1 (Full width)
    </div>
  </div>

  <!-- Section 2 -->
  <div class="container section">
    <div class="bg-light p-5">
      Section 2 (Normal container)
    </div>
  </div>

  <!-- Section 3: RIGHT TOUCH -->
  <div class="container section">
    <div class="bg-success box right-touch">
      Section 3 (Right touches screen, left aligned to container)
    </div>
  </div>

  <!-- Section 4: LEFT TOUCH -->
  <div class="container section">
    <div class="bg-warning box left-touch text-dark">
      Section 4 (Left touches screen, right aligned to container)
    </div>
  </div>

</body>
</html>
