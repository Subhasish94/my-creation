    <section class="slider-control">
        <div class="container">
            <div class="row">
                <div class="col-4">
                    <div class="slider-container mw-100">
                        <label class=""> slides PerView: <span class="slides_PerView_set">1</span></label>
                        <input type="range" class="slider" id="slides_PerView_get" value="1" min="1" max="20" step="1">
                        <label class="">spaceBetween: <span class="spaceBetween_set">0</span>px</label>
                        <input type="range" class="slider" id="spaceBetween" value="0" min="0" max="50" step="1">

                        <input type="range" class="slider" id="opacity" value="0.5" min="0" max="1" step="0.01"> -->
                        <input type="checkbox" name="" id="auto_play">
                        <label for="auto_play">auto play</label>
                        <div class="autoplay">
                            <label for="">delay: <span class="delay_set">5000</span> </label>
                            <br>
                            <input type="number" class="form-control " value="5000" id="delay_get"
                                placeholder="delay in ms">
                            <label for="">disableOnInteraction: <span class="disableOnInteraction_set"></span></label>
                            <select name="" id="disableOnInteraction_get" class="mw-100 w-100 ">
                                <option value="true">True</option>
                                <option value="false" selected>False</option>
                                <option value="none">none</option>
                            </select>
                        </div>
                        <br>
