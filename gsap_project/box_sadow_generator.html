<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>box-shadow</title>
</head>

<body>
    <section class="box-shadow">
        <div class="container">
            <div class="heading text-center border border-2 border-info ">
                <h1 class="text-uppercase">box shadow generator</h1>
                <div class="show_shadow_value">box-shadow: <span class="shadow_type">inset</span>
                    <span class="horizontal_set_value">100</span>px
                    <span class="vertical_set_value">100</span>px
                    <span class="blur_set_value">100</span>px
                    <span class="spread_set_value">0</span>px
                    <span class="rgb_value">rgba(0,0,0,0.75)</span>;
                </div>
            </div>
            <div class="wrap">
                <div class="row">
                    <div class="col-6">
                        <div class="slider-container">
                            <label class="">Horizontal Length: <span class="horizontal_set_value">100</span>px</label>
                            <input type="range" class="slider" id="horizontal" value="10" min="-200" max="200" step="1">
                            <label class="">Vertical Length: <span class="vertical_set_value">100</span>px</label>
                            <input type="range" class="slider" id="vertical" value="10" min="-200" max="200" step="1">
                            <label class="">Blur Radius: <span class="blur_set_value">0</span>px</label>
                            <input type="range" class="slider" id="blur" value="0" min="0" max="100" step="1">
                            <label class="">Spread Radius: <span class="spread_set_value">0</span>px</label>
                            <input type="range" class="slider" id="spread" value="0" min="-200" max="200" step="1">
                            <label class="">Shadow Color: <span class="Shadow_set_value">#000000</span></label>
                            <br>
                            <input type="color" class="slider color-pic" id="Shadow">
                            <br>
                            <label class="">opacity: <span class="opacity_set_value">0.5</span></label>
                            <input type="range" class="slider" id="opacity" value="0.5" min="0" max="1" step="0.01">
                            <div class="d-flex align-items-center">
                                <span>Outline</span>
                                <label class="switch">
                                    <input type="checkbox" id="shadow_type">
                                    <span class="round"></span>
                                </label>
                                <span>Inset</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="result_show_div">
                            <div class="box-shadow-result">
                                <small>box-shadow: <span class="result"></span></small>
                                <small>-moz-box-shadow: <span class="result"></span></small>
                                <small>-webkit-box-shadow: <span class="result"></span></small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <style>

    </style>
    <script src="script.js"></script>
</body>

</html>
