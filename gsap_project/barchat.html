<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>barchiat</title>
</head>

<body>
    <main>
        <div class="container">
            <div id="text_content">heading</div>
            <div class="row">
                <div class="col-lg-6">
                    <canvas id="myChart" style="width:100%;max-width:600px"></canvas>
                </div>
                <div class="col-lg-6">
                    <canvas id="myChart_2" style="width:100%;max-width:600px"></canvas>
                </div>
                <div class="col-lg-6">

                    <script src="https://www.gstatic.com/charts/loader.js"></script>
                    <div id="myChart_3" style="width:100%; height:500px;"></div>

                    <script>
                        google.charts.load('current', { packages: ['corechart'] });
                        google.charts.setOnLoadCallback(drawChart);

                        function drawChart() {

                            // Set Data
                            const data = google.visualization.arrayToDataTable([
                                ['Price', 'Size'],
                                [50, 7], [60, 8], [70, 8], [80, 9], [90, 9],
                                [100, 9], [110, 10], [120, 11],
                                [130, 14], [140, 14], [150, 15]
                            ]);

                            // Set Options
                            const options = {
                                title: chart_heading(),
                                hAxis: { title: 'Square Meters' },
                                vAxis: { title: 'Price in Millions' },
                                legend: 'none'
                            };

                            // Draw
                            const chart = new google.visualization.LineChart(document.getElementById('myChart_3'));
                            chart.draw(data, options);

                        }
                    </script>
                </div>
            </div>
            <script>
                const xValues = ["Italy", "France", "Spain", "USA", "Argentina", "ttt"];
                const yValues = [55, 49, 44, 24, 15, 70];
                const barColors = ["red", "green", "blue", "orange", "brown", "green"];
                function chart_heading() {
                    return document.getElementById('text_content').textContent;
                }
                new Chart("myChart", {
                    type: "bar",
                    data: {
                        labels: xValues,
                        datasets: [{
                            backgroundColor: barColors,
                            data: yValues
                        }]
                    },
                    options: {
                        legend: { display: false },
                        title: {
                            display: true,
                            text: chart_heading()
                        }
                    }
                });










                const xValues_1 = ["Italy", "France", "Spain", "USA", "Argentina"];
                const yValues_2 = [55, 49, 44, 24, 15];
                const barColors_3 = [
                    "#b91d47",
                    "#00aba9",
                    "#2b5797",
                    "#e8c3b9",
                    "#1e7145"
                ];

                new Chart("myChart_2", {
                    type: "doughnut",
                    data: {
                        labels: xValues_1,
                        datasets: [{
                            backgroundColor: barColors_3,
                            data: yValues_2
                        }]
                    },
                    options: {
                        title: {
                            display: true,
                            text: chart_heading()
                        }
                    }
                });

            </script>
        </div>

    </main>
    <script src="script.js"></script>
</body>

</html>
