<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Precise Corner Touch</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* SAME GEOMETRY SYSTEM */
.wrapper {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* TOP */
.top {
  position: absolute;
  top: 0;
  width: 100%;
  height: 50%;

  background: #4f46e5;

  /* smoother diagonal line */
  clip-path: polygon(0 0, 100% 0, 49% 100%, 0 100%);
}

/* BOTTOM */
.bottom {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;

  background: #06b6d4;

  /* MATCHING slope (key improvement) */
  clip-path: polygon(49% 0, 100% 0, 100% 100%, 0 100%);
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="top"></div>
  <div class="bottom"></div>
</div>

</body>
</html>
