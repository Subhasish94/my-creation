<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="">
	<meta name="author" content="">
	<title>jquery</title>
	<!-- Bootstrap core CSS -->
	<link href="css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="css/swiper-bundle.min.css">
	<!-- <link href="css/style.css" rel="stylesheet">
	<link href="css/responsive.css" rel="stylesheet"> -->
	<script src="js/jquery.min.js"></script>
	<script src="js/bootstrap.bundle.min.js"></script>
	<script src="js/swiper-bundle.min.js"></script>
</head>
<div id="page " class="bg-dark pt-5 mt-5">
	<section>
		<div class="container">
			<div class="choose-color">
				<div class="pointer">
					<div class="shape"></div>
				</div>
			</div>
		</div>
	</section>

	<section>
		<div class="container">
			<div class="colorPicker">
				<div class="twod" style="background: rgb(255, 0, 112);">
					<div class="pointer">
						<!-- <div class="shape shape1"></div>
						<div class="shape shape2"></div> -->
					</div>
					<div class="bg bg1"></div>

				</div>
			</div>
		</div>
	</section>
	<style>
		.colorPicker .bg1 {
			height: 400px;
			z-index: 0;
			background: -webkit-gradient(linear, left top, right top, from(#fff), to(rgba(255, 255, 255, 0)));
			background: linear-gradient(to right, #fff 0%, rgba(255, 255, 255, 0) 100%);
		}

		.pointer {
			position: relative;
			z-index: 2;
		}

		.shape {
			position: absolute;
			width: 12px;
			margin-left: -6px;
			margin-top: -4px;
			height: 80px;
			border: 3px solid black;
			border-radius: 6px;
		}

		.choose-color {
			height: 80px;
			background: linear-gradient(to right, hsl(0, 100%, 50%), hsl(60, 100%, 50%), hsl(120, 100%, 50%), hsl(180, 100%, 50%), hsl(240, 100%, 50%), hsl(300, 100%, 50%), hsl(360, 100%, 50%));
		}
	</style>
</div>
<script>
$(document).ready(function () {
	var isDragging = false;
	var offsetX = 0;
	var div2 = $('.shape');
	div2.on('mousedown touchstart', function (e) {
		e.preventDefault(); // Prevent text selection or unwanted behavior on mobile
		isDragging = true;
		offsetX = e.pageX || e.originalEvent.touches[0].pageX - div2.offset().left; // Handle touch devices
		$(document).on('mousemove touchmove', mouseMove);
		$(document).on('mouseup touchend', mouseUp);
	});

	// Mouse or touch move event to drag the element
	function mouseMove(e) {
		if (isDragging) {
			var pageX = e.pageX || e.originalEvent.touches[0].pageX; // Handle touch devices
			var left = pageX - offsetX;
			var div1Width = $('.pointer').width();
			var div2Width = div2.width();

			// Ensure div2 stays within div1 bounds (left to right)
			if (left < 0) left = 0;
			if (left > div1Width - div2Width) left = div1Width - div2Width;

			div2.css('left', left);
		}
	}

	// Mouse up or touch end event to stop dragging
	function mouseUp() {
		isDragging = false;
		$(document).off('mousemove touchmove', mouseMove);
		$(document).off('mouseup touchend', mouseUp);
	}
});

</script>
</body>

</html>
