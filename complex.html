<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra SaaS System Level 3</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:sans-serif;
  overflow-x:hidden;
  background:#0f172a;
  color:white;
}

/* ================= GLOBAL GRID WRAPPER ================= */
.page{
  display:grid;
  grid-template-rows: 100vh auto auto auto auto;
}

/* ================= HERO (4 LAYERS SYSTEM) ================= */
.hero{
  position:relative;
  display:grid;
  grid-template-columns: 1.5fr 1fr;
  overflow:hidden;
}

/* BACKGROUND LAYER 1 */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  clip-path:polygon(0 0, 100% 0, 55% 100%, 0 100%);
  z-index:0;
}

/* BACKGROUND LAYER 2 (secondary depth) */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.04);
  clip-path:polygon(60% 0, 100% 0, 100% 100%, 40% 100%);
  z-index:0;
}

/* HERO CONTENT LAYER */
.hero-left{
  position:relative;
  z-index:2;
  padding:120px;
}

/* RIGHT COMPLEX PRODUCT STACK */
.hero-right{
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* stacked UI mock system */
.stack{
  width:85%;
  height:75%;
  position:relative;
}

.layerA, .layerB, .layerC, .layerD{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:18px;
}

/* front UI */
.layerA{
  background:white;
  clip-path:polygon(0 0, 100% 0, 88% 100%, 0 100%);
  z-index:4;
}

/* mid UI */
.layerB{
  background:#e5e7eb;
  top:15px;
  left:15px;
  z-index:3;
}

/* back UI */
.layerC{
  background:#cbd5e1;
  top:30px;
  left:30px;
  z-index:2;
}

/* deepest shadow */
.layerD{
  background:#94a3b8;
  top:45px;
  left:45px;
  z-index:1;
}

/* ================= FEATURE ENGINE GRID ================= */
.features{
  display:grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap:30px;
  padding:120px;
  background:#f8fafc;
  color:black;
}

/* MAIN BLOCK */
.main{
  background:white;
  padding:80px;
  clip-path:polygon(0 0, 100% 0, 94% 100%, 0 100%);
}

/* SIDE STACKS */
.stack-col{
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:30px;
}

.box{
  background:white;
  padding:35px;
  clip-path:polygon(10% 0, 100% 0, 100% 100%, 0 100%);
}

/* ================= DATA FLOW SECTION ================= */
.flow{
  height:90vh;
  display:grid;
  grid-template-columns:1fr 1fr;
}

/* DARK ENGINE */
.flow-left{
  background:#111827;
  padding:100px;
  clip-path:polygon(0 0, 100% 0, 75% 100%, 0 100%);
}

/* LIGHT ENGINE */
.flow-right{
  background:#06b6d4;
  padding:100px;
  clip-path:polygon(25% 0, 100% 0, 100% 100%, 0 100%);
}

/* ================= COMPLEX METRICS STRIP ================= */
.metrics{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:20px;
  padding:120px;
}

.metric{
  background:#e2e8f0;
  color:black;
  padding:40px;
  clip-path:polygon(0 0, 100% 0, 90% 100%, 0 100%);
}

/* ================= MULTI CTA SYSTEM ================= */
.cta{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:50vh;
}

.cta1{
  background:#4f46e5;
  display:flex;
  align-items:center;
  justify-content:center;
  clip-path:polygon(0 0, 100% 20%, 80% 100%, 0 100%);
}

.cta2{
  background:#06b6d4;
  display:flex;
  align-items:center;
  justify-content:center;
  clip-path:polygon(10% 0, 100% 0, 100% 100%, 0 80%);
}

.cta3{
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div class="page">

<!-- HERO -->
<section class="hero">

  <div class="hero-left">
    <h1>Ultra SaaS System Level 3</h1>
    <p>Advanced multi-layer UI architecture system</p>
    <button class="btn btn-light mt-3">Launch</button>
  </div>

  <div class="hero-right">
    <div class="stack">
      <div class="layerD"></div>
      <div class="layerC"></div>
      <div class="layerB"></div>
      <div class="layerA"></div>
    </div>
  </div>

</section>

<!-- FEATURES -->
<section class="features">

  <div class="main">
    <h2>Core Engine</h2>
    <p>Main system architecture block</p>
  </div>

  <div class="stack-col">
    <div class="box">Feature A</div>
    <div class="box">Feature B</div>
  </div>

  <div class="stack-col">
    <div class="box">Feature C</div>
    <div class="box">Feature D</div>
  </div>

</section>

<!-- FLOW -->
<section class="flow">

  <div class="flow-left">
    <h2>System Logic Layer</h2>
  </div>

  <div class="flow-right">
    <h2>Visualization Layer</h2>
  </div>

</section>

<!-- METRICS -->
<section class="metrics">
  <div class="metric">Users</div>
  <div class="metric">Speed</div>
  <div class="metric">Scale</div>
  <div class="metric">API</div>
  <div class="metric">Cloud</div>
  <div class="metric">AI</div>
</section>

<!-- CTA -->
<section class="cta">

  <div class="cta1">Start</div>
  <div class="cta2">Deploy</div>
  <div class="cta3">Scale</div>

</section>

</div>

</body>
</html>
